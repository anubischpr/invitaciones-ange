<defs>
  <linearGradient id="electricBeam" gradientUnits="userSpaceOnUse" x1="-1000" y1="0" x2="0" y2="0">
    <stop offset="0%" stop-color="#d9804a" />
    <stop offset="40%" stop-color="#d9804a" />
    <stop offset="50%" stop-color="#ffffff">
      <!-- Glow flicker effect -->
      <animate attributeName="stop-color" values="#ffffff;#fffbcc;#ffffff" dur="0.2s" repeatCount="indefinite" />
    </stop>
    <stop offset="60%" stop-color="#d9804a" />
    <stop offset="100%" stop-color="#d9804a" />
    <!-- Move the beam across the internal space (7250 units wide) -->
    <animate attributeName="x1" values="-1000; 8000" dur="3s" repeatCount="indefinite" />
    <animate attributeName="x2" values="0; 9000" dur="3s" repeatCount="indefinite" />
  </linearGradient>
</defs>
